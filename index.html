<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockupBatcher macOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body, html, #root {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            background-color: #050505;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        #boot-loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            background: #050505;
            transition: opacity 0.4s ease-out;
        }
        #error-display {
            display: none;
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            color: #ff4d4d;
            z-index: 10001;
            padding: 40px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            overflow: auto;
            white-space: pre-wrap;
        }
        .mac-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .mac-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .mac-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .mac-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.463.0?external=react",
    "@google/genai": "https://esm.sh/@google/genai@0.2.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>
<body>
    <div id="boot-loader">
        <div class="w-10 h-10 border-2 border-neutral-800 border-t-white rounded-full animate-spin mb-6"></div>
        <div class="text-[10px] font-black uppercase tracking-[0.4em] text-neutral-500 animate-pulse">Initializing Neural Studio</div>
    </div>
    
    <div id="error-display"></div>
    <div id="root"></div>

    <script type="module" src="index.tsx"></script>

    <script>
        window.onerror = function(msg, url, line, col, error) {
            const display = document.getElementById('error-display');
            if (display) {
                display.style.display = 'block';
                display.innerHTML = `<h1 style="font-size: 18px; font-weight: bold; margin-bottom: 12px; color: #fff;">Kernel Panic</h1><p>${msg}</p><p style="opacity:0.5; font-size:11px; margin-top:8px;">${url}:${line}:${col}</p><pre style="margin-top: 24px; color: #777; font-size: 11px; line-height: 1.5;">${error ? error.stack : 'No stack trace available'}</pre>`;
            }
            const loader = document.getElementById('boot-loader');
            if (loader) loader.style.display = 'none';
        };
        
        // Failsafe: Remove loader after 4 seconds regardless of React status
        setTimeout(() => {
            const loader = document.getElementById('boot-loader');
            if (loader && loader.style.opacity !== '0') {
                loader.style.opacity = '0';
                setTimeout(() => { if (loader && loader.parentNode) loader.remove(); }, 500);
            }
        }, 4000);
    </script>
</body>
</html>
