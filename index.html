<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1b140c" />
<title>Return Them Home — Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1b140c; color: #2c2416; overflow: hidden; }
  #map { position: fixed; inset: 0; background: #0f1620; }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; gap: 12px;
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background: linear-gradient(180deg, rgba(20,15,8,0.92), rgba(20,15,8,0));
    color: #f5efe2; pointer-events: none;
  }
  .topbar h1 { font-size: 17px; font-weight: 700; text-shadow: 0 1px 6px rgba(0,0,0,0.8); }
  .topbar .count { font-size: 12px; color: #d8c9ad; }
  .topbar .spacer { flex: 1; }
  .switch-3d {
    pointer-events: auto; font-size: 13px; font-weight: 600; text-decoration: none;
    color: #1a1205; background: linear-gradient(180deg,#e8b24a,#d2932a);
    padding: 9px 14px; border-radius: 999px; white-space: nowrap;
  }

  #loading { position: fixed; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center; background: #1b140c; color: #d8c9ad; font-size: 15px; }

  /* Popup */
  .leaflet-popup-content-wrapper { border-radius: 12px; }
  .leaflet-popup-content { margin: 0; width: 260px !important; }
  .pc { overflow: hidden; border-radius: 12px; }
  .pc-img { width: 100%; height: 200px; background:#222 no-repeat center; background-size: cover; }
  .pc-body { padding: 12px 14px 14px; }
  .pc-name { font-size: 16px; font-weight: 700; line-height: 1.25; color:#241c10; }
  .pc-origin { color: #b07d1a; font-size: 13px; margin-top: 2px; font-weight: 600; }
  .pc-meta { margin: 8px 0; font-size: 13px; color:#4a4030; line-height: 1.5; }
  .pc-meta b { color:#6a5c40; font-weight:600; }
  .pc-desc { font-size: 12.5px; line-height: 1.45; color:#5a513f; max-height: 6.5em; overflow:auto; }
  .pc-link { display:inline-block; margin-top:10px; font-size:13px; font-weight:600; color:#b07d1a; text-decoration:none; }
</style>
</head>
<body>
  <div id="map"></div>
  <div class="topbar">
    <div>
      <h1>Return Them Home</h1>
      <div class="count"><span id="count">…</span> British Museum objects · tap to explore</div>
    </div>
    <div class="spacer"></div>
    <a class="switch-3d" href="../return-them-home/?full=1">🌐 3D Globe</a>
  </div>
  <div id="loading">Loading the collection…</div>

  <script>
    const ATLAS = { sheet: 4096, tile: 128, perRow: 32 };
    const BM = { lat: 51.5194, lng: -0.1269 };

    const map = L.map('map', { zoomControl: false, attributionControl: false, worldCopyJump: true })
      .setView([20, 10], 2);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    function dateText(a) {
      if (a.date_text) return a.date_text;
      if (a.year == null) return 'Unknown';
      return a.year < 0 ? Math.abs(a.year) + ' BC' : a.year + ' AD';
    }
    // Atlas-tile thumbnail as a CSS background (no per-object image download).
    function thumbStyle(a, px) {
      const sheetPx = ATLAS.perRow * px; // full sheet scaled so each tile = px
      return `background-image:url(atlas/atlas_${a.atlas.atlas_index}.jpg);` +
             `background-size:${sheetPx}px ${sheetPx}px;` +
             `background-position:-${a.atlas.u * sheetPx}px -${a.atlas.v * sheetPx}px;`;
    }

    // Small gold dot marker (cheap; clustering does the heavy lifting).
    const dotIcon = L.divIcon({
      className: '',
      html: '<div style="width:10px;height:10px;border-radius:50%;background:#e8b24a;border:1px solid rgba(0,0,0,0.5);box-shadow:0 0 3px rgba(0,0,0,0.6)"></div>',
      iconSize: [10, 10], iconAnchor: [5, 5],
    });

    function popupHtml(a) {
      const url = a.image_source_url || a.image_url || '';
      return `<div class="pc">
        <div class="pc-img" style="${thumbStyle(a, 260)}"></div>
        <div class="pc-body">
          <div class="pc-name">${esc(a.name || a.bm_id)}</div>
          <div class="pc-origin">${esc(a.origin || a.origin_country || '')}</div>
          <div class="pc-meta"><b>Date:</b> ${esc(dateText(a))}${a.material ? `<br><b>Material:</b> ${esc(a.material)}` : ''}${a.museum_number ? `<br><b>Museum no.:</b> ${esc(a.museum_number)}` : ''}</div>
          ${a.description ? `<div class="pc-desc">${esc(a.description)}</div>` : ''}
          ${url ? `<a class="pc-link" href="${esc(url)}" target="_blank" rel="noopener">View at the British Museum ↗</a>` : ''}
        </div></div>`;
    }

    fetch('artifacts.json').then((r) => r.json()).then((arts) => {
      document.getElementById('count').textContent = arts.length.toLocaleString();
      const cluster = L.markerClusterGroup({
        chunkedLoading: true,
        maxClusterRadius: 50,
        spiderfyOnMaxZoom: true,
      });
      for (const a of arts) {
        if (typeof a.lat !== 'number' || typeof a.lng !== 'number') continue;
        const m = L.marker([a.lat, a.lng], { icon: dotIcon });
        m.bindPopup(() => popupHtml(a), { maxWidth: 260, minWidth: 260 });
        cluster.addLayer(m);
      }
      map.addLayer(cluster);
      document.getElementById('loading').remove();
    }).catch((e) => {
      document.getElementById('loading').textContent = 'Failed to load: ' + e.message;
    });
  </script>
</body>
</html>
